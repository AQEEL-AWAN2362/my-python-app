# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.13.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.13.11'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: ✅ Run tests
        run: pytest test_app.py -v

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t my-python-app .

      - name: 🔍 Verify container starts
        run: |
          docker rm -f test-container >/dev/null 2>&1 || true
          docker run -d -p 8001:8001 --name test-container my-python-app
          sleep 10
          for i in {1..15}; do
            if [ "$(docker inspect -f '{{.State.Running}}' test-container)" != "true" ]; then
              echo "Container exited before health check. Logs:"
              docker logs test-container
              exit 1
            fi
            if curl --fail --silent --show-error http://localhost:8001/health; then
              echo "Health endpoint is up"
              docker stop test-container
              break
            fi
            echo "Waiting for container... attempt $i"
            sleep 2
            if [ "$i" -eq 15 ]; then
              echo "Container failed health check. Logs:"
              docker logs test-container
              docker stop test-container || true
              exit 1
            fi
          done