# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────
  # JOB 1 — Run Tests (runs on push + PR)
  # ─────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐍 Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: 📦 Install dependencies
        run: pip install -r requirements.txt

      - name: ✅ Run tests
        run: pytest test_app.py -v

  # ─────────────────────────────────────
  # JOB 2 — Build & Push (push only)
  # ─────────────────────────────────────
  build-docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    outputs:
      image: ${{ steps.build-push.outputs.image }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐳 Build Docker image
        run: docker build -t my-python-app .

      - name: 🔍 Verify container starts
        run: |
          docker rm -f test-container >/dev/null 2>&1 || true
          docker run -d -p 8000:8000 --name test-container my-python-app
          sleep 10
          for i in {1..15}; do
            if [ "$(docker inspect -f '{{.State.Running}}' test-container)" != "true" ]; then
              echo "Container exited before health check. Logs:"
              docker logs test-container
              exit 1
            fi
            if curl --fail --silent --show-error http://localhost:8000/health; then
              echo "Health endpoint is up"
              docker stop test-container
              break
            fi
            echo "Waiting for container... attempt $i"
            sleep 2
            if [ "$i" -eq 15 ]; then
              echo "Container failed health check. Logs:"
              docker logs test-container
              docker stop test-container || true
              exit 1
            fi
          done

      - name: 🔐 Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registries: "430102461141"

      - name: 📤 Tag and push image to ECR
        id: build-push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

          echo "Full image URI: $FULL_IMAGE"

          docker tag my-python-app "$FULL_IMAGE"
          docker tag my-python-app "$LATEST_IMAGE"

          docker push "$FULL_IMAGE"
          docker push "$LATEST_IMAGE"

          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"
          echo "Saved to GITHUB_OUTPUT: image=$FULL_IMAGE"

  # ─────────────────────────────────────
  # JOB 3 — Deploy to ECS (push only)
  # ─────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'

    env:
      IMAGE_URI: ${{ needs.build-docker.outputs.image }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🔐 Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: 📋 Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_DEFINITION }} \
            --region ${{ secrets.AWS_REGION }} \
            --query taskDefinition \
            > task-definition.json

      - name: 🔍 Debug image output
        run: |
          echo "Image received in deploy: $IMAGE_URI"

      - name: 🔄 Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: my-python-app-container
          image: ${{ needs.build-docker.outputs.image }}

      - name: 🚀 Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true